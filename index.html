<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Frostyland Play | Descongela el Boli</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Pantalla de Inicio -->
    <div id="inicio" class="pantalla activa">
        <div class="contenedor">
            <img src="img/Logo-FrostylandV2.png" class="logo" alt="Frostyland Logo">
            <h1>❄ FROSTYLAND PLAY ❄</h1>
            <h2>DESCONGELA EL BOLI</h2>
            <h3>BUBULUBÚ</h3>
            <button id="btnInicio">COMENZAR</button>
        </div>
    </div>

    <!-- Pantalla de Instrucciones -->
    <div id="instrucciones" class="pantalla oculto">
        <div class="contenedor">
            <h2>📜 INSTRUCCIONES</h2>
            <p>🧊 Rompe completamente el hielo.</p>
            <p>🎁 Descubre tu premio.</p>
            <p>📸 Si ganas, toma captura.</p>
            <p>📲 Envíala por WhatsApp.</p>
            <p>🏆 Los primeros 3 ganan.</p>
            <div id="contador">01:00:00</div>
            <button id="btnJugar">ESTOY LISTO</button>
        </div>
    </div>

    <!-- Pantalla de Juego -->
    <div id="juego" class="pantalla oculto">
        <div class="contenedor">
            <h3>🧊 DESCONGELA EL BOLI 🧊</h3>
            <div id="zonaJuego">
                <img id="premioImagen" src="" alt="Premio">
                <canvas id="canvas" width="320" height="320"></canvas>
            </div>
            <!-- Barra de progreso DENTRO del contenedor del juego -->
            <div id="barra">
                <div id="progreso"></div>
            </div>
            <p id="porcentaje">0%</p>
        </div>
    </div>

    <!-- Pantalla de Premio -->
<div id="premio" class="pantalla oculto">
    <div class="contenedor">
        <img id="imagenPremio" src="" width="180" alt="Premio">
        <h2 id="tituloPremio"></h2>
        <p id="textoPremio"></p>
        <a id="whatsapp" href="#" target="_blank">
            <button>📲 ENVIAR CAPTURA</button>
        </a>
        <button id="btnReiniciar" style="margin-top: 12px; background: linear-gradient(90deg, #667eea, #764ba2); color: white;">
            🔄 JUGAR DE NUEVO
        </button>
    </div>
</div>

    <script src="js/app.js"></script>
</body>
</html>
